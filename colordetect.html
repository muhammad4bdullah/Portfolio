
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Analyzer Pro</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

/* GLASS CARD */
.container {
  width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.upload {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 20px;
  cursor: pointer;
}

.preview {
  width: 100%;
  height: 130px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid #333;
}

.label {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}

.value {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 10px;
}

.bar {
  position: relative;
  height: 16px;
  border-radius: 10px;
  overflow: hidden;
}

.knob {
  position: absolute;
  width: 6px;
  height: 30px;
  background: white;
  top: 0px;
  transform: translateX(-50%);
  border-radius: 4px;
  box-shadow: 0 0 10px white;
}

#satBar {
  background: linear-gradient(to right, gray, red);
}

#lightBar {
  background: linear-gradient(to right, black, white);
}

#hsbCanvas {
  width: 100%;
  height: 30px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.result {
  margin-top: 20px;
  padding: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="upload">
    <input type="file" id="file">
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <div class="preview" id="preview"></div>

  <!-- HUE -->
  <div class="label">Hue</div>
  <div style="position:relative;">
    <canvas id="hsbCanvas" width="360" height="30"></canvas>
    <div class="knob" id="hueKnob"></div>
  </div>
  <div class="value" id="hueVal"></div>

  <!-- SAT -->
  <div class="label">Saturation</div>
  <div class="bar" id="satBar">
    <div class="knob" id="satKnob"></div>
  </div>
  <div class="value" id="satVal"></div>

  <!-- LIGHT -->
  <div class="label">Brightness</div>
  <div class="bar" id="lightBar">
    <div class="knob" id="lightKnob"></div>
  </div>
  <div class="value" id="lightVal"></div>

  <div class="result" id="result">Upload image</div>

</div>

  <script>

const fileInput = document.getElementById("file");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");

// 🎨 HUE CANVAS
const hsbCanvas = document.getElementById('hsbCanvas');
const hsbCtx = hsbCanvas.getContext('2d');

// 🔥 FIX: make canvas match real screen size
function resizeHue() {
  const rect = hsbCanvas.getBoundingClientRect();
  hsbCanvas.width = rect.width;
  hsbCanvas.height = rect.height;
  drawHue();
}

function drawHue() {
  const gradient = hsbCtx.createLinearGradient(0, 0, hsbCanvas.width, 0);

  for (let i = 0; i <= 360; i += 2) {
    gradient.addColorStop(i / 360, `hsl(${i},100%,50%)`);
  }

  hsbCtx.fillStyle = gradient;
  hsbCtx.fillRect(0, 0, hsbCanvas.width, hsbCanvas.height);
}

// 📷 IMAGE ANALYSIS
fileInput.onchange = function(e) {
  const file = e.target.files[0];
  const img = new Image();

  img.onload = function() {
    canvas.width = 200;
    canvas.height = 200;
    ctx.drawImage(img, 0, 0, 200, 200);

    const data = ctx.getImageData(0, 0, 200, 200).data;

    let sumX = 0, sumY = 0;
    let totalS = 0, totalL = 0;
    let count = 0;

    for (let i = 0; i < data.length; i += 4) {

      let r = data[i] / 255;
      let g = data[i + 1] / 255;
      let b = data[i + 2] / 255;

      let max = Math.max(r, g, b);
      let min = Math.min(r, g, b);

      let h, s, l;
      l = (max + min) / 2;

      if (max === min) continue;

      let d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        case b: h = (r - g) / d + 4; break;
      }

      h *= 60;

      if (s < 0.15 || l < 0.1 || l > 0.9) continue;

      let rad = h * Math.PI / 180;
      sumX += Math.cos(rad);
      sumY += Math.sin(rad);

      totalS += s * 100;
      totalL += l * 100;

      count++;
    }

    let avgRad = Math.atan2(sumY/count, sumX/count);
    let H = avgRad * 180 / Math.PI;
    if (H < 0) H += 360;

    let S = totalS / count;
    let L = totalL / count;

    updateUI(H, S, L, img.src);
  }

  img.src = URL.createObjectURL(file);
};

// 🎯 UI UPDATE
function updateUI(h, s, l, imgSrc) {

  preview.style.backgroundImage = `url(${imgSrc})`;
  preview.style.backgroundSize = "cover";

  const rect = hsbCanvas.getBoundingClientRect();

  // 🔥 FIX: correct knob position
  document.getElementById("hueKnob").style.left =
    ((h / 360) * rect.width) + "px";

  document.getElementById("satKnob").style.left = s + "%";
  document.getElementById("lightKnob").style.left = l + "%";

  document.getElementById("satBar").style.background =
    `linear-gradient(to right, gray, hsl(${h},100%,50%))`;

  document.getElementById("hueVal").innerText = `Hue: ${h.toFixed(1)}°`;
  document.getElementById("satVal").innerText = `Saturation: ${s.toFixed(1)}%`;
  document.getElementById("lightVal").innerText = `Brightness: ${l.toFixed(1)}%`;

  document.getElementById("result").innerHTML =
    `HSL(${h.toFixed(1)}, ${s.toFixed(1)}%, ${l.toFixed(1)}%)`;
}

// init
window.addEventListener("resize", resizeHue);
resizeHue();

</script>

</body>
</html>
