<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Analyzer Pro</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  width: 420px;
}

canvas {
  display: none;
}

.upload {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  margin-bottom: 20px;
}

.preview {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  margin-bottom: 15px;
  border: 1px solid #333;
}

.bar {
  position: relative;
  height: 18px;
  border-radius: 10px;
  margin: 14px 0;
  overflow: hidden;
}

.knob {
  position: absolute;
  width: 6px;
  height: 18px;
  background: white;
  top: 0;
  transform: translateX(-50%);
  transition: left 0.15s ease;
  border-radius: 4px;
}

.label {
  font-size: 12px;
  margin-bottom: 4px;
  opacity: 0.8;
}

.value {
  font-size: 13px;
  margin-bottom: 10px;
  color: #aaa;
}

/* Hue gradient */
#hueBar {
  background: linear-gradient(
    to right,
    red, yellow, lime, cyan, blue, magenta, red
  );
}

/* Saturation */
#satBar {
  background: linear-gradient(to right, gray, red);
}

/* Brightness */
#lightBar {
  background: linear-gradient(to right, black, white);
}

.result {
  margin-top: 20px;
  font-size: 14px;
  color: #ccc;
}

</style>
</head>

<body>

<div class="container">

  <div class="upload">
    <input type="file" id="file">
  </div>

  <canvas id="canvas"></canvas>

  <div class="preview" id="preview"></div>

  <div class="label">Hue</div>
  <div class="bar" id="hueBar">
    <div class="knob" id="hueKnob"></div>
  </div>
  <div class="value" id="hueVal"></div>

  <div class="label">Saturation</div>
  <div class="bar" id="satBar">
    <div class="knob" id="satKnob"></div>
  </div>
  <div class="value" id="satVal"></div>

  <div class="label">Brightness</div>
  <div class="bar" id="lightBar">
    <div class="knob" id="lightKnob"></div>
  </div>
  <div class="value" id="lightVal"></div>

  <div class="result" id="result"></div>

</div>

<script>

const fileInput = document.getElementById("file");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const preview = document.getElementById("preview");

fileInput.onchange = function(e) {
  const file = e.target.files[0];
  const img = new Image();

  img.onload = function() {
    canvas.width = 200;
    canvas.height = 200;
    ctx.drawImage(img, 0, 0, 200, 200);

    const data = ctx.getImageData(0, 0, 200, 200).data;

    let totalH = 0, totalS = 0, totalL = 0;
    let count = 0;

    for (let i = 0; i < data.length; i += 4) {

      let r = data[i] / 255;
      let g = data[i + 1] / 255;
      let b = data[i + 2] / 255;

      let max = Math.max(r, g, b);
      let min = Math.min(r, g, b);

      let h, s, l;

      l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        let d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }

        h *= 60;
      }

      // noise filter (IMPORTANT FIX)
      if ((r + g + b) < 0.15) continue;
      if ((r + g + b) > 2.8) continue;

      totalH += h;
      totalS += s * 100;
      totalL += l * 100;

      count++;
    }

    let H = totalH / count;
    let S = totalS / count;
    let L = totalL / count;

    if (H < 0) H += 360;

    updateUI(H, S, L, img.src);
  }

  img.src = URL.createObjectURL(file);
};

function updateUI(h, s, l, imgSrc) {

  preview.style.backgroundImage = `url(${imgSrc})`;
  preview.style.backgroundSize = "cover";

  const huePercent = (h / 360) * 100;

  document.getElementById("hueKnob").style.left = huePercent + "%";
  document.getElementById("satKnob").style.left = s + "%";
  document.getElementById("lightKnob").style.left = l + "%";

  document.getElementById("hueVal").innerText =
    `Hue: ${h.toFixed(1)}° (${huePercent.toFixed(1)}%)`;

  document.getElementById("satVal").innerText =
    `Saturation: ${s.toFixed(1)}%`;

  document.getElementById("lightVal").innerText =
    `Brightness: ${l.toFixed(1)}%`;

  document.getElementById("result").innerHTML =
    `HSL(${h.toFixed(1)}, ${s.toFixed(1)}%, ${l.toFixed(1)}%)`;
}

</script>

</body>
</html>
